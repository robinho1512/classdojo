<!doctype html>
<html lang="pt-br" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduClass Dojo - Portal do Aluno, Professor & Responsável</title>
    <!-- Tailwind CDN & Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #0a0a0b; }
      ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #c4a47c; }
      .font-serif-cormorant { font-family: 'Cormorant Garamond', serif; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
  </head>
  <body class="bg-[#0a0a0b] text-[#e4e4e7] antialiased">
    <div id="root"></div>

    <!-- React 18, ReactDOM 18 & Lucide Icons ESM Importmap -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1/client",
          "lucide-react": "https://esm.sh/lucide-react@0.415.0?external=react"
        }
      }
    </script>

    <script type="text/babel" data-type="module">
      /** @jsx React.createElement */
      import React, { useState, useEffect, useMemo } from 'react';
      import { createRoot } from 'react-dom';
      import {
        Users, MessageSquare, Calendar, TrendingUp, Shield, CreditCard, 
        Search, Plus, Filter, Send, Download, Sparkles, Wifi, WifiOff, 
        AlertTriangle, Check, Trash2, Globe, Moon, Sun, DollarSign, 
        Award, AlertCircle, FileText, Smartphone, Fingerprint, RefreshCw,
        Clock, ArrowRight, Layers, HelpCircle, CheckSquare, Square, Clipboard, Paperclip, CheckCircle,
        GraduationCap, KeyRound, Hand, Heart, FileX, MessageSquareOff, ShieldAlert, ZapOff, CheckSquare as CheckIcon
      } from 'lucide-react';

      // --- TRADUÇÕES ---
      const translations = {
        pt: {
          classroom: "Sala de Aula", students: "Alunos", behavior: "Comportamento",
          messages: "Mensagens Privadas", calendar: "Calendário Escolar", reports: "Relatórios",
          adminPanel: "Painel Admin", payment: "Mensalidades & Taxas", logout: "Sair",
          all: "Todos", addStudent: "Adicionar Aluno", exportPdf: "Exportar PDF",
          exportExcel: "Exportar Excel (CSV)", chatAssistant: "EduAI Assistente", aiHelp: "Perguntar ao EduAI"
        },
        en: {
          classroom: "Classroom", students: "Students", behavior: "Behavior",
          messages: "Private Messages", calendar: "School Calendar", reports: "Reports",
          adminPanel: "Admin Panel", payment: "Fees & Payments", logout: "Logout",
          all: "All", addStudent: "Add Student", exportPdf: "Export PDF",
          exportExcel: "Export Excel (CSV)", chatAssistant: "EduAI Assistant", aiHelp: "Ask EduAI"
        }
      };

      // --- DADOS SEED DEFAULT ---
      const DEFAULT_DB = {
        students: [
          { id: "s1", name: "Artur Silva", avatar: "👾", points: 14, parentEmail: "artur.pais@email.com", parentName: "Marcos Silva" },
          { id: "s2", name: "Beatriz Costa", avatar: "🦄", points: 22, parentEmail: "beatriz.pais@email.com", parentName: "Helena Costa" },
          { id: "s3", name: "Caio Oliveira", avatar: "🐯", points: 8, parentEmail: "caio.pais@email.com", parentName: "Sofia Oliveira" },
          { id: "s4", name: "Davi Santos", avatar: "🤖", points: 24, parentEmail: "joaopedro.joaopedro12345678910@gmail.com", parentName: "João Santos" },
          { id: "s5", name: "Eduarda Pereira", avatar: "🦊", points: 3, parentEmail: "eduarda.pais@email.com", parentName: "Renato Pereira" }
        ],
        categories: [
          { id: "c1", name: "Trabalho em Equipe", points: 1, type: "positive", icon: "Users" },
          { id: "c2", name: "Participação Ativa", points: 1, type: "positive", icon: "Hand" },
          { id: "c3", name: "Ajudar Colegas", points: 2, type: "positive", icon: "Heart" },
          { id: "c4", name: "Lição de Casa Completa", points: 1, type: "positive", icon: "CheckCircle" },
          { id: "c5", name: "Persistência", points: 2, type: "positive", icon: "Award" },
          { id: "c6", name: "Sem Lição de Casa", points: -1, type: "negative", icon: "FileX" },
          { id: "c7", name: "Conversa Paralela", points: -1, type: "negative", icon: "MessageSquareOff" },
          { id: "c8", name: "Desrespeito em Sala", points: -2, type: "negative", icon: "ShieldAlert" },
          { id: "c9", name: "Fora da Cadeira / Distraído", points: -1, type: "negative", icon: "ZapOff" }
        ],
        point_logs: [
          { id: "pl1", studentId: "s1", categoryName: "Trabalho em Equipe", points: 1, description: "Colaborou muito bem no projeto de ciências.", timestamp: new Date(Date.now() - 3 * 3600000).toISOString(), type: "positive" },
          { id: "pl2", studentId: "s2", categoryName: "Participação Ativa", points: 1, description: "Respondeu perguntas difíceis na aula.", timestamp: new Date(Date.now() - 2 * 3600000).toISOString(), type: "positive" },
          { id: "pl3", studentId: "s4", categoryName: "Ajudar Colegas", points: 2, description: "Ajudou a organizar todos os materiais do grupo.", timestamp: new Date(Date.now() - 1 * 3600000).toISOString(), type: "positive" }
        ],
        messages: [
          { id: "m1", senderId: "teacher_1", senderName: "Prof. Ricardo Silva", receiverId: "joaopedro.joaopedro12345678910@gmail.com", content: "Olá João! O Davi foi fantástico hoje na aula de artes, ajudou muito os colegas.", timestamp: new Date(Date.now() - 24 * 3600000).toISOString() },
          { id: "m2", senderId: "joaopedro.joaopedro12345678910@gmail.com", senderName: "João Santos", receiverId: "teacher_1", content: "Que excelente notícia, Professor! Ficamos muito orgulhosos dele.", timestamp: new Date(Date.now() - 22 * 3600000).toISOString() }
        ],
        calendar: [
          { id: "e1", title: "Feira de Ciências Anual", description: "Apresentação dos projetos no ginásio.", date: new Date(Date.now() + 3 * 24 * 3600000).toISOString().split('T')[0], category: "event" },
          { id: "e2", title: "Reunião de Pais e Mestres", description: "Entrega de boletins e conversa.", date: new Date(Date.now() + 7 * 24 * 3600000).toISOString().split('T')[0], category: "meeting" }
        ],
        payments: [
          { id: "p1", title: "Livro Didático de Geografia - 5º Ano", amount: 120.00, dueDate: new Date(Date.now() + 5 * 24 * 3600000).toISOString().split('T')[0], status: "pending", category: "material" },
          { id: "p2", title: "Excursão para o Planetário", amount: 45.00, dueDate: new Date(Date.now() + 12 * 24 * 3600000).toISOString().split('T')[0], status: "pending", category: "trip" },
          { id: "p3", title: "Mensalidade Escolar - Junho", amount: 450.00, dueDate: new Date(Date.now() - 2 * 24 * 3600000).toISOString().split('T')[0], status: "paid", category: "tuition" }
        ],
        webhooks: [
          { id: "w1", url: "https://api.escola.com/webhooks/behavior", name: "Sincronizador Secretaria", events: ["points.add", "messages.sent"], active: true }
        ],
        audit_logs: [
          { id: "l1", action: "Inicialização do Sistema", user: "Administrador", timestamp: new Date().toISOString(), details: "Banco de dados local sincronizado e ativo." }
        ]
      };

      // --- MOCK CHATBOT RESPOSTAS ---
      const BOT_REPLIES = [
        "Com certeza! O reforço positivo em sala estimula o engajamento e cria uma cultura de cooperação fantástica.",
        "Para alunos mais agitados, sugerimos focar em feedbacks imediatos usando recompensas do baú do tesouro para reter a atenção.",
        "Uma comunicação fluida com os responsáveis via mensagens privadas reduz em até 70% as fricções comportamentais na escola.",
        "Excelente pergunta! O Dojo encoraja a persistência através da gamificação de tarefas diárias simples.",
        "Se precisar de um rascunho de e-mail ou relatório personalizado, selecione o aluno e clique em 'Gerar com IA' no painel."
      ];

      function App() {
        // Auth, Role & UI preferences
        const [isLoggedIn, setIsLoggedIn] = useState(false);
        const [role, setRole] = useState('student'); // 'student', 'teacher', 'parent', 'admin'
        const [userEmail, setUserEmail] = useState('aluno@escola.com');
        const [activeTab, setActiveTab] = useState('student_dashboard');
        const [lang, setLang] = useState('pt');
        const [darkMode, setDarkMode] = useState(true);

        // Database states
        const [students, setStudents] = useState([]);
        const [categories, setCategories] = useState([]);
        const [pointLogs, setPointLogs] = useState([]);
        const [messages, setMessages] = useState([]);
        const [calendarEvents, setCalendarEvents] = useState([]);
        const [payments, setPayments] = useState([]);
        const [auditLogs, setAuditLogs] = useState([]);
        const [webhooks, setWebhooks] = useState([]);

        // Interactive UI Filter & Form States
        const [searchQuery, setSearchQuery] = useState('');
        const [activeStudentForPoints, setActiveStudentForPoints] = useState(null);
        const [showAddStudentModal, setShowAddStudentModal] = useState(false);
        const [showAddEventModal, setShowAddEventModal] = useState(false);
        const [showAddCategoryModal, setShowAddCategoryModal] = useState(false);
        const [showPayModal, setShowPayModal] = useState(null);
        const [showEduAIChat, setShowEduAIChat] = useState(false);
        const [isBatchMode, setIsBatchMode] = useState(false);
        const [selectedStudentIds, setSelectedStudentIds] = useState([]);

        // Forms fields
        const [newStudentName, setNewStudentName] = useState('');
        const [newStudentParentEmail, setNewStudentParentEmail] = useState('');
        const [newStudentParentName, setNewStudentParentName] = useState('');
        const [newStudentAvatar, setNewStudentAvatar] = useState('🤖');

        const [newCategoryName, setNewCategoryName] = useState('');
        const [newCategoryPoints, setNewCategoryPoints] = useState(1);
        const [newCategoryType, setNewCategoryType] = useState('positive');

        const [newEventTitle, setNewEventTitle] = useState('');
        const [newEventDesc, setNewEventDesc] = useState('');
        const [newEventDate, setNewEventDate] = useState('');
        const [newEventCategory, setNewEventCategory] = useState('event');

        const [newMessageText, setNewMessageText] = useState('');
        const [messageRecipientEmail, setMessageRecipientEmail] = useState('');
        const [attachedFile, setAttachedFile] = useState(null);

        // Payment mock
        const [cardName, setCardName] = useState('');
        const [cardNumber, setCardNumber] = useState('');

        // EduAI assist
        const [aiPromptText, setAiPromptText] = useState('');
        const [aiChatHistory, setAiChatHistory] = useState([
          { sender: 'ai', text: 'Olá! Sou o EduAI, seu assistente de comportamento. Como posso te apoiar hoje com insights do Dojo?', timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
        ]);
        const [aiLoading, setAiLoading] = useState(false);

        // Smart Report Modal
        const [activeAIReportCard, setActiveAIReportCard] = useState(null);
        const [generatingReportForId, setGeneratingReportForId] = useState(null);

        // Daily quests state for active student view
        const [quests, setQuests] = useState([
          { id: 'q1', text: 'Chegar no horário hoje', reward: 1, completed: false },
          { id: 'q2', text: 'Ajudar a organizar a sala', reward: 2, completed: false },
          { id: 'q3', text: 'Prestar atenção sem interrupções', reward: 1, completed: false },
          { id: 'q4', text: 'Concluir a lição do dia', reward: 2, completed: false }
        ]);

        const t = translations[lang] || translations.pt;

        // Load data on start
        useEffect(() => {
          let db = localStorage.getItem('educlass_dojo_db');
          if (!db) {
            localStorage.setItem('educlass_dojo_db', JSON.stringify(DEFAULT_DB));
            db = JSON.stringify(DEFAULT_DB);
          }
          const data = JSON.parse(db);
          setStudents(data.students || []);
          setCategories(data.categories || []);
          setPointLogs(data.point_logs || []);
          setMessages(data.messages || []);
          setCalendarEvents(data.calendar || []);
          setPayments(data.payments || []);
          setAuditLogs(data.audit_logs || []);
          setWebhooks(data.webhooks || []);
        }, []);

        // Save helper
        const saveDB = (updates) => {
          const current = {
            students, categories, point_logs: pointLogs, messages, calendar: calendarEvents, payments, audit_logs: auditLogs, webhooks
          };
          const merged = { ...current, ...updates };
          localStorage.setItem('educlass_dojo_db', JSON.stringify(merged));
          if (updates.students) setStudents(updates.students);
          if (updates.categories) setCategories(updates.categories);
          if (updates.point_logs) setPointLogs(updates.point_logs);
          if (updates.messages) setMessages(updates.messages);
          if (updates.calendar) setCalendarEvents(updates.calendar);
          if (updates.payments) setPayments(updates.payments);
          if (updates.audit_logs) setAuditLogs(updates.audit_logs);
          if (updates.webhooks) setWebhooks(updates.webhooks);
        };

        // Student representing logged user (Davi is the standard mockup student)
        const loggedInStudent = useMemo(() => {
          return students.find(s => s.parentEmail === userEmail || s.name.toLowerCase().includes("davi")) || students[3] || {
            id: 's4', name: 'Davi Santos', avatar: '🤖', points: 24, parentEmail: 'joaopedro.joaopedro12345678910@gmail.com', parentName: 'João Santos'
          };
        }, [students, userEmail]);

        // Login handle without auth roadblocks
        const handleLogin = (selectedRole, email) => {
          setRole(selectedRole);
          setUserEmail(email);
          setIsLoggedIn(true);

          if (selectedRole === 'student') {
            setActiveTab('student_dashboard');
            setMessageRecipientEmail('ricardo.silva@escola.com');
          } else if (selectedRole === 'parent') {
            setActiveTab('classroom');
            setMessageRecipientEmail('ricardo.silva@escola.com');
          } else {
            setActiveTab('classroom');
            setMessageRecipientEmail('joaopedro.joaopedro12345678910@gmail.com');
          }
          
          // Log audit
          const newLog = {
            id: 'l_' + Date.now(), action: "Acesso ao Sistema", user: email, timestamp: new Date().toISOString(), details: `Login efetuado como ${selectedRole}.`
          };
          saveDB({ audit_logs: [newLog, ...auditLogs] });
        };

        // Actions
        const handleAddStudent = (e) => {
          e.preventDefault();
          if (!newStudentName) return;
          const newStud = {
            id: 's_' + Date.now(), name: newStudentName, avatar: newStudentAvatar, points: 0,
            parentEmail: newStudentParentEmail || "responsavel@email.com", parentName: newStudentParentName || "Responsável"
          };
          const updated = [...students, newStud];
          const log = { id: 'l_' + Date.now(), action: "Adicionar Aluno", user: userEmail, timestamp: new Date().toISOString(), details: `Aluno ${newStudentName} cadastrado.` };
          saveDB({ students: updated, audit_logs: [log, ...auditLogs] });
          setNewStudentName(''); setNewStudentParentEmail(''); setNewStudentParentName(''); setShowAddStudentModal(false);
        };

        const handleDeleteStudent = (id, name) => {
          if (confirm(`Deseja realmente remover o aluno ${name}?`)) {
            const updated = students.filter(s => s.id !== id);
            const logsFiltered = pointLogs.filter(log => log.studentId !== id);
            const log = { id: 'l_' + Date.now(), action: "Remover Aluno", user: userEmail, timestamp: new Date().toISOString(), details: `Aluno ${name} e histórico removidos.` };
            saveDB({ students: updated, point_logs: logsFiltered, audit_logs: [log, ...auditLogs] });
          }
        };

        const handleAddCategory = (e) => {
          e.preventDefault();
          if (!newCategoryName) return;
          const newCat = {
            id: 'c_' + Date.now(), name: newCategoryName,
            points: newCategoryType === 'positive' ? Math.abs(newCategoryPoints) : -Math.abs(newCategoryPoints),
            type: newCategoryType, icon: newCategoryType === 'positive' ? 'Award' : 'ShieldAlert'
          };
          saveDB({ categories: [...categories, newCat] });
          setNewCategoryName(''); setShowAddCategoryModal(false);
        };

        const handleGivePoints = (category) => {
          if (!activeStudentForPoints) return;
          const stud = students.find(s => s.id === activeStudentForPoints.id);
          if (!stud) return;

          stud.points += category.points;
          const pl = {
            id: 'pl_' + Math.random().toString(36).substr(2, 9), studentId: stud.id,
            categoryName: category.name, points: category.points, description: `Comportamento: ${category.name}`,
            timestamp: new Date().toISOString(), type: category.type
          };
          const updatedStuds = students.map(s => s.id === stud.id ? stud : s);
          saveDB({ students: updatedStuds, point_logs: [pl, ...pointLogs] });
          setActiveStudentForPoints(null);
        };

        const handleBatchPoints = (category) => {
          if (selectedStudentIds.length === 0) return;
          const newLogs = [];
          const updatedStuds = students.map(s => {
            if (selectedStudentIds.includes(s.id)) {
              s.points += category.points;
              newLogs.push({
                id: 'pl_' + Math.random().toString(36).substr(2, 9), studentId: s.id,
                categoryName: category.name, points: category.points, description: `Coletivo: ${category.name}`,
                timestamp: new Date().toISOString(), type: category.type
              });
            }
            return s;
          });
          saveDB({ updatedStuds, point_logs: [...newLogs, ...pointLogs] });
          setSelectedStudentIds([]);
          setIsBatchMode(false);
        };

        const handleSendMessage = (e) => {
          e.preventDefault();
          if (!newMessageText.trim() && !attachedFile) return;

          const sId = role === 'teacher' ? 'teacher_1' : userEmail;
          const rId = role === 'teacher' ? messageRecipientEmail : 'teacher_1';
          const newMsg = {
            id: 'msg_' + Date.now(), senderId: sId,
            senderName: role === 'teacher' ? 'Prof. Ricardo Silva' : 'João Santos',
            receiverId: rId, content: newMessageText, timestamp: new Date().toISOString(),
            attachment: attachedFile || undefined
          };

          const nextMessages = [...messages, newMsg];
          setNewMessageText('');
          setAttachedFile(null);
          saveDB({ messages: nextMessages });

          // Simulate automatic responsive reply after 1.5 seconds to feel intelligent
          setTimeout(() => {
            const simulatedMsg = {
              id: 'msg_reply_' + Date.now(), senderId: rId,
              senderName: role === 'teacher' ? 'João Santos (Responsável)' : 'Prof. Ricardo Silva',
              receiverId: sId,
              content: role === 'teacher' 
                ? "Olá, agradeço o feedback. Estamos acompanhando de perto o desenvolvimento dele aqui em casa!" 
                : "Olá! Agradecemos o contato. Vou analisar os pontos comportamentais em sala e entrarei em contato se necessário. Bom dia!",
              timestamp: new Date().toISOString()
            };
            // Read from local storage to prevent overwrite racing
            const latestDb = JSON.parse(localStorage.getItem('educlass_dojo_db') || '{}');
            const mergedMsgs = [...(latestDb.messages || nextMessages), simulatedMsg];
            saveDB({ messages: mergedMsgs });
          }, 1500);
        };

        const handleAddCalendarEvent = (e) => {
          e.preventDefault();
          if (!newEventTitle || !newEventDate) return;
          const newEvt = {
            id: 'evt_' + Date.now(), title: newEventTitle, description: newEventDesc, date: newEventDate, category: newEventCategory
          };
          saveDB({ calendar: [...calendarEvents, newEvt] });
          setNewEventTitle(''); setNewEventDesc(''); setNewEventDate(''); setShowAddEventModal(false);
        };

        const handleDeleteEvent = (id) => {
          saveDB({ calendar: calendarEvents.filter(e => e.id !== id) });
        };

        const handlePayFee = (e) => {
          e.preventDefault();
          if (!showPayModal || !cardName || !cardNumber) return;
          const updated = payments.map(p => p.id === showPayModal.id ? { ...p, status: 'paid' } : p);
          const audit = {
            id: 'l_' + Date.now(), action: "Pagamento Efetuado", user: userEmail, timestamp: new Date().toISOString(),
            details: `Mensalidade/Taxa '${showPayModal.title}' de R$ ${showPayModal.amount} paga por ${cardName}.`
          };
          saveDB({ payments: updated, audit_logs: [audit, ...auditLogs] });
          setCardName(''); setCardNumber(''); setShowPayModal(null);
          alert("🎉 Pagamento simulado com sucesso!");
        };

        const handleAskDojoAI = (e) => {
          e.preventDefault();
          if (!aiPromptText.trim()) return;

          const userMsg = { sender: 'user', text: aiPromptText, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
          setAiChatHistory(prev => [...prev, userMsg]);
          setAiPromptText('');
          setAiLoading(true);

          setTimeout(() => {
            const randomReply = BOT_REPLIES[Math.floor(Math.random() * BOT_REPLIES.length)];
            setAiChatHistory(prev => [...prev, {
              sender: 'ai', text: randomReply, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }]);
            setAiLoading(false);
          }, 1000);
        };

        // Dynamic generation of Weekly Report (Simulation of Smart AI Agent)
        const handleGenerateAIReport = (student) => {
          setGeneratingReportForId(student.id);
          setTimeout(() => {
            const studLogs = pointLogs.filter(log => log.studentId === student.id).slice(0, 10);
            const scoreText = student.points >= 20 ? "Excepcional" : student.points >= 10 ? "Satisfatório" : "Atenção Necessária";
            const reportText = `### Relatório Comportamental Semanal - ${student.name}
**Análise do Professor:** O aluno tem se saído muito bem no comportamento geral. Pontuação atual: **${student.points} pontos**.

**Comportamentos Recentes Observados:**
${studLogs.length > 0 ? studLogs.map(l => `- [${l.type === 'positive' ? '✓' : '✗'}] ${l.categoryName}: ${l.description}`).join('\n') : '- Nenhum log recente ainda.'}

**Plano de Ação Pedagógico:**
1. Manter o incentivo por meio do reforço de pontos positivos nas tarefas em equipe.
2. Estimular participação ativa na leitura em voz alta.

**Mensagem Sugerida para os Responsáveis:**
"Olá! Gostaria de parabenizar o esforço do(a) ${student.name} esta semana. Ele está com a classificação comportamental: *${scoreText}*. Continuamos juntos por aqui!"`;
            
            setActiveAIReportCard({ student, reportText });
            setGeneratingReportForId(null);
          }, 800);
        };

        // Interactive Quests Handler
        const handleQuestCheck = (questId, completed, reward) => {
          setQuests(quests.map(q => q.id === questId ? { ...q, completed } : q));
          if (completed) {
            loggedInStudent.points += reward;
            const logEntry = {
              id: 'pl_' + Math.random().toString(36).substr(2, 9), studentId: loggedInStudent.id,
              categoryName: "Missão Diária Concluída", points: reward, description: "Ganhou bônus por tarefa diária cumprida!",
              timestamp: new Date().toISOString(), type: 'positive'
            };
            saveDB({
              students: students.map(s => s.id === loggedInStudent.id ? loggedInStudent : s),
              point_logs: [logEntry, ...pointLogs]
            });

                      </h3>
                    </div>
                    <button onClick={() => setActiveStudentForPoints(null)} className="text-slate-500 hover:text-slate-300">Fechar</button>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-2">
                      <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Positivos (+)</span>
                      <div className="space-y-1.5 max-h-64 overflow-y-auto pr-1">
                        {categories.filter(c => c.type === 'positive').map(cat => (
                          <button
                            key={cat.id}
                            onClick={() => {
                              if (activeStudentForPoints.id === 'batch_selection') handleBatchPoints(cat);
                              else handleGivePoints(cat);
                            }}
                            className="w-full text-left p-3 rounded-xl bg-slate-950 border border-slate-900 text-xs hover:border-emerald-500/40 hover:bg-[#10b981]/5 transition flex justify-between items-center"
                          >
                            <span className="font-bold text-slate-200">{cat.name}</span>
                            <span className="font-mono font-bold text-emerald-400">+{cat.points}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="space-y-2">
                      <span className="text-[10px] font-bold text-rose-400 uppercase tracking-widest">Atenção (-)</span>
                      <div className="space-y-1.5 max-h-64 overflow-y-auto pr-1">
                        {categories.filter(c => c.type === 'negative').map(cat => (
                          <button
                            key={cat.id}
                            onClick={() => {
                              if (activeStudentForPoints.id === 'batch_selection') handleBatchPoints(cat);
                              else handleGivePoints(cat);
                            }}
                            className="w-full text-left p-3 rounded-xl bg-slate-950 border border-slate-900 text-xs hover:border-rose-500/40 hover:bg-[#f43f5e]/5 transition flex justify-between items-center"
                          >
                            <span className="font-bold text-slate-200">{cat.name}</span>
                            <span className="font-mono font-bold text-rose-400">{cat.points}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* --- MODAL: SMART AI BEHAVIOR REPORT --- */}
            {activeAIReportCard && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-[#141416] border border-slate-900 p-6 rounded-3xl max-w-xl w-full space-y-4">
                  <div className="flex justify-between items-center border-b border-slate-950 pb-3">
                    <span className="font-serif-cormorant text-2xl text-slate-100 flex items-center gap-2">
                      <Sparkles className="w-5 h-5 text-amber-400 animate-pulse" />
                      <span>Rascunho de IA para {activeAIReportCard.student.name}</span>
                    </span>
                    <button onClick={() => setActiveAIReportCard(null)} className="text-slate-500 hover:text-slate-300">Fechar</button>
                  </div>

                  <div className="bg-slate-950 border border-slate-900 p-5 rounded-2xl text-xs text-slate-300 overflow-y-auto max-h-96 space-y-3 font-sans leading-relaxed">
                    {activeAIReportCard.reportText.split('\n').map((line, idx) => (
                      <p key={idx}>{line}</p>
                    ))}
                  </div>

                  <div className="flex justify-end gap-3 pt-3">
                    <button
                      onClick={() => {
                        setMessageRecipientEmail(activeAIReportCard.student.parentEmail);
                        setNewMessageText(`Olá! Aqui está o relatório de comportamento do(a) ${activeAIReportCard.student.name} desta semana:\n\n${activeAIReportCard.reportText}`);
                        setActiveTab('messages');
                        setActiveAIReportCard(null);
                      }}
                      className="px-4 py-2 bg-[#c4a47c] text-slate-950 font-bold rounded-xl text-xs hover:bg-[#b09069] transition"
                    >
                      Enviar para o Responsável no Chat
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* --- MODAL: ADD STUDENT --- */}
            {showAddStudentModal && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                <form onSubmit={handleAddStudent} className="bg-[#141416] border border-slate-900 p-6 rounded-3xl max-w-md w-full space-y-4">
                  <h3 className="font-serif-cormorant text-2xl text-slate-100">Matricular Novo Aluno</h3>
                  
                  <div className="space-y-3 text-xs">
                    <div>
                      <label className="block text-slate-400 mb-1">Nome Completo</label>
                      <input
                        type="text" required value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)}
                        className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 text-xs focus:border-[#c4a47c]"
                        placeholder="Nome do aluno"
                      />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-slate-400 mb-1">Nome do Responsável</label>
                        <input
                          type="text" value={newStudentParentName} onChange={(e) => setNewStudentParentName(e.target.value)}
                          className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 text-xs focus:border-[#c4a47c]"
                          placeholder="Responsável"
                        />
                      </div>
                      <div>
                        <label className="block text-slate-400 mb-1">E-mail do Responsável</label>
                        <input
                          type="email" value={newStudentParentEmail} onChange={(e) => setNewStudentParentEmail(e.target.value)}
                          className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 text-xs focus:border-[#c4a47c]"
                          placeholder="email@escola.com"
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-slate-400 mb-1">Avatar Emoji</label>
                      <div className="grid grid-cols-6 gap-2">
                        {['🤖', '👾', '🦊', '🐯', '🦄', '🦁', '🐻', '🐼', '🐨', '🦖', '🐙', '🐝'].map(emoji => (
                          <button
                            type="button" key={emoji} onClick={() => setNewStudentAvatar(emoji)}
                            className={`p-2.5 rounded-xl text-xl border transition ${newStudentAvatar === emoji ? 'bg-[#c4a47c]/15 border-[#c4a47c]' : 'bg-slate-950 border-slate-900 hover:border-slate-800'}`}
                          >
                            {emoji}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="flex justify-end gap-3 pt-3">
                    <button type="button" onClick={() => setShowAddStudentModal(false)} className="px-4 py-2 text-xs text-slate-400">Cancelar</button>
                    <button type="submit" className="px-4 py-2 bg-[#c4a47c] text-slate-950 font-bold rounded-xl text-xs">Adicionar</button>
                  </div>
                </form>
              </div>
            )}

            {/* --- MODAL: ADD EVENT --- */}
            {showAddEventModal && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                <form onSubmit={handleAddCalendarEvent} className="bg-[#141416] border border-slate-900 p-6 rounded-3xl max-w-md w-full space-y-4">
                  <h3 className="font-serif-cormorant text-2xl text-slate-100">Agendar Evento no Dojo</h3>
                  
                  <div className="space-y-3 text-xs">
                    <div>
                      <label className="block text-slate-400 mb-1">Título do Evento</label>
                      <input
                        type="text" required value={newEventTitle} onChange={(e) => setNewEventTitle(e.target.value)}
                        className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c]"
                        placeholder="Ex: Feira de ciências"
                      />
                    </div>
                    <div>
                      <label className="block text-slate-400 mb-1">Descrição</label>
                      <textarea
                        value={newEventDesc} onChange={(e) => setNewEventDesc(e.target.value)}
                        className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c] h-20"
                        placeholder="Detalhes..."
                      />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-slate-400 mb-1">Data</label>
                        <input
                          type="date" required value={newEventDate} onChange={(e) => setNewEventDate(e.target.value)}
                          className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c]"
                        />
                      </div>
                      <div>
                        <label className="block text-slate-400 mb-1">Categoria</label>
                        <select
                          value={newEventCategory} onChange={(e) => setNewEventCategory(e.target.value)}
                          className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c]"
                        >
                          <option value="event">Evento</option>
                          <option value="holiday">Feriado</option>
                          <option value="exam">Avaliação</option>
                          <option value="meeting">Reunião</option>
                        </select>
                      </div>
                    </div>
                  </div>

                  <div className="flex justify-end gap-3 pt-3">
                    <button type="button" onClick={() => setShowAddEventModal(false)} className="px-4 py-2 text-xs text-slate-400">Cancelar</button>
                    <button type="submit" className="px-4 py-2 bg-[#c4a47c] text-slate-950 font-bold rounded-xl text-xs">Salvar</button>
                  </div>
                </form>
              </div>
            )}

            {/* --- MODAL: PAYMENT CHECKOUT SIMULATOR --- */}
            {showPayModal && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                <form onSubmit={handlePayFee} className="bg-[#141416] border border-slate-900 p-6 rounded-3xl max-w-sm w-full space-y-4">
                  <div>
                    <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest font-mono">Checkout Seguro</span>
                    <h3 className="font-serif-cormorant text-2xl text-slate-100">Pagar Taxa Escolar</h3>
                    <p className="text-xs text-slate-400 mt-1">{showPayModal.title}</p>
                    <div className="text-3xl font-bold font-mono text-[#c4a47c] mt-2">R$ {showPayModal.amount.toFixed(2)}</div>
                  </div>

                  <div className="space-y-3 text-xs pt-2">
                    <div>
                      <label className="block text-slate-400 mb-1">Nome no Cartão</label>
                      <input
                        type="text" required value={cardName} onChange={(e) => setCardName(e.target.value)}
                        className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c]"
                        placeholder="Nome como impresso"
                      />
                    </div>
                    <div>
                      <label className="block text-slate-400 mb-1">Número do Cartão</label>
                      <input
                        type="text" required value={cardNumber} onChange={(e) => setCardNumber(e.target.value)}
                        maxLength="19" className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c] font-mono"
                        placeholder="4444 4444 4444 4444"
                      />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-slate-400 mb-1">Validade</label>
                        <input
                          type="text" required maxLength="5" className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c] font-mono"
                          placeholder="MM/AA"
                        />
                      </div>
                      <div>
                        <label className="block text-slate-400 mb-1">CVV</label>
                        <input
                          type="password" required maxLength="3" className="w-full p-2.5 rounded-xl bg-slate-950 border border-slate-900 text-slate-100 focus:border-[#c4a47c] font-mono"
                          placeholder="123"
                        />
                      </div>
                    </div>
                  </div>

                  <div className="flex gap-3 pt-3">
                    <button type="button" onClick={() => setShowPayModal(null)} className="flex-1 py-2.5 border border-slate-900 rounded-xl text-xs text-slate-400">Cancelar</button>
                    <button type="submit" className="flex-1 py-2.5 bg-[#c4a47c] hover:bg-[#b09069] text-slate-900 font-bold rounded-xl text-xs uppercase tracking-wider">Confirmar</button>
                  </div>
                </form>
              </div>
            )}

          </div>
        );
      }

      // Render standalone App
      const rootEl = document.getElementById('root');
      if (rootEl) {
        const root = createRoot(rootEl);
        root.render(<App />);
      }
    </script>
  </body>
</html>
