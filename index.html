      ],

      ],

        { id: "l1", action: "Inicialização do Sistema", user: "Administrador", timestamp: new Date().toISOString(), details: "Banco de dados local seedado e online." }
      ],
      webhook_trigger_logs: [
        { id: "wt1", webhookName: "Sincronizador Secretaria", url: "https://api.escola.com/webhooks/behavior", eventType: "points.add", status: 200, timestamp: new Date().toISOString(), payload: "{\"studentId\":\"s1\",\"points\":1}" }
      ]
    };

    // Sub-component: LoginModal
    function LoginModal({ onLogin, userEmail }) {
      const [role, setRole] = useState('student');
      const [email, setEmail] = useState('aluno@escola.com');

      const handleRoleChange = (selectedRole) => {
        setRole(selectedRole);
        if (selectedRole === 'teacher') setEmail('ricardo.silva@escola.com');
        else if (selectedRole === 'parent') setEmail('joaopedro.joaopedro12345678910@gmail.com');
        else if (selectedRole === 'admin') setEmail('admin@escola.com');
        else setEmail('aluno@escola.com');
      };

      return (
        <div className="fixed inset-0 bg-[#0a0a0b]/90 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
          <div className="bg-[#141416] border border-slate-900 rounded-3xl p-8 max-w-md w-full shadow-2xl relative overflow-hidden">
            <div className="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-[#c4a47c] via-[#b09069] to-[#c4a47c]"></div>
            <div className="text-center mb-8">
              <div className="mx-auto w-14 h-14 rounded-2xl bg-[#c4a47c]/10 flex items-center justify-center text-[#c4a47c] mb-4 border border-[#c4a47c]/25">
                <Award className="w-8 h-8" />
              </div>
              <h2 className="text-3xl font-serif text-slate-100 tracking-wide">EduClass Dojo</h2>
              <p className="text-slate-400 text-sm mt-1.5 font-light">Selecione seu perfil de acesso</p>
            </div>

            <form onSubmit={(e) => { e.preventDefault(); onLogin(role, email); }} className="space-y-6">
              <div>
                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 text-center">Perfil</label>
                <div className="grid grid-cols-2 gap-3">
                  {[
                    { id: 'student', icon: GraduationCap, label: 'Aluno' },
                    { id: 'teacher', icon: Users, label: 'Professor' },
                    { id: 'parent', icon: Shield, label: 'Responsável' },
                    { id: 'admin', icon: KeyRound, label: 'Admin' }
                  ].map((item) => {
                    const Icon = item.icon;
                    return (
                      <button
                        key={item.id}
                        type="button"
                        onClick={() => handleRoleChange(item.id)}
                        className={`py-3 px-2 text-xs font-semibold rounded-xl border flex flex-col items-center gap-2 transition ${
                          role === item.id 
                            ? 'bg-[#c4a47c]/15 border-[#c4a47c] text-[#c4a47c]' 
                            : 'bg-[#1e1e21] border-slate-800 text-slate-400 hover:text-slate-200'
                        }`}
                      >
                        <Icon className="w-5 h-5" />
                        <span>{item.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div>
                <label className="block text-xs font-medium text-slate-400 mb-1.5">Identificação</label>
                <input
                  type="text"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  className="w-full px-4 py-2.5 rounded-xl border border-slate-800 bg-[#1e1e21] text-slate-100 text-sm focus:outline-none focus:border-[#c4a47c] transition"
                  placeholder="exemplo@escola.com"
                  required
                />
              </div>

              <button
                type="submit"
                className="w-full py-3.5 bg-[#c4a47c] hover:bg-[#b09069] text-[#0a0a0b] font-bold rounded-xl shadow-lg transition duration-300 text-sm"
              >
                Acessar Portal
              </button>
            </form>
          </div>
        </div>
      );

    // Sub-component: Sidebar
    function Sidebar({ activeTab, setActiveTab, role, userEmail, onLogout, isOffline, setIsOffline, lang, setLang, darkMode, setDarkMode, t, onOpenEduAI }) {
      const getRoleBadge = () => {
        switch(role) {
          case 'teacher': return { text: 'Professor', style: 'bg-teal-500/10 text-teal-600 dark:text-teal-400 border-teal-500/20' };
          case 'parent': return { text: 'Responsável', style: 'bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border-indigo-500/20' };
          case 'admin': return { text: 'Administrador', style: 'bg-amber-500/10 text-amber-600 dark:text-amber-400 border-amber-500/20' };
          default: return { text: 'Aluno', style: 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border-emerald-500/20' };
        }
      };
      const badge = getRoleBadge();

      return (
        <aside className="w-full lg:w-72 bg-white dark:bg-slate-900 border-b lg:border-b-0 lg:border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between shrink-0 p-6 z-10">

                  <span className="font-bold text-lg">D</span>
                </div>
                <div>
                  <h1 className="font-bold text-slate-800 dark:text-slate-100 font-sans leading-none">EduClass</h1>
                  <span className="text-xs text-slate-400 font-mono tracking-widest">DOJO</span>
                </div>
              </div>
              <button
                onClick={() => setIsOffline(!isOffline)}
                className={`p-2 rounded-xl border transition ${
                  isOffline ? 'bg-amber-50 border-amber-200 text-amber-600' : 'bg-emerald-50 border-emerald-200 text-emerald-600 dark:bg-slate-800/40'
                }`}
              >
                {isOffline ? <WifiOff className="w-4 h-4" /> : <Wifi className="w-4 h-4" />}
              </button>
            </div>

            <div className="bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 p-4 rounded-2xl">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-teal-500 to-indigo-500 flex items-center justify-center text-white font-bold text-sm shrink-0">
                  {role === 'teacher' ? 'Prof' : role === 'parent' ? 'Pais' : role === 'admin' ? 'Adm' : 'Alu'}
                </div>
                <div className="overflow-hidden">
                  <h2 className="text-sm font-semibold text-slate-800 dark:text-slate-100 leading-tight truncate">
                    {role === 'teacher' ? 'Prof. Ricardo Silva' : role === 'parent' ? 'João Santos' : role === 'admin' ? 'Admin Geral' : 'Davi Santos'}
                  </h2>
                  <p className="text-xs text-slate-400 dark:text-slate-500 truncate mb-1">{userEmail}</p>
                  <span className={`inline-block text-[10px] px-2 py-0.5 font-bold rounded-full border ${badge.style}`}>{badge.text}</span>
                </div>
              </div>
            </div>

            <nav className="space-y-1">
              {role === 'student' ? (
                <>
                  <button onClick={() => setActiveTab('student_dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'student_dashboard' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                    <Sparkles className="w-4 h-4" /> <span>Dojo do Aluno</span>
                  </button>
                  <button onClick={() => setActiveTab('classroom')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'classroom' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                    <Users className="w-4 h-4" /> <span>Minha Turma</span>
                  </button>
                </>
              ) : (
                <button onClick={() => setActiveTab('classroom')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'classroom' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                  <Users className="w-4 h-4" /> <span>{t.classroom}</span>
                </button>
              )}

              <button onClick={() => setActiveTab('messages')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'messages' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                <MessageSquare className="w-4 h-4" /> <span>{t.messages}</span>
              </button>

              <button onClick={() => setActiveTab('calendar')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'calendar' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                <Calendar className="w-4 h-4" /> <span>{t.calendar}</span>
              </button>

              {role !== 'student' && (
                <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'reports' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                  <TrendingUp className="w-4 h-4" /> <span>{t.reports}</span>
                </button>
              )}

              {role !== 'student' && (
                <button onClick={() => setActiveTab('payment')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'payment' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                  <CreditCard className="w-4 h-4" /> <span>{t.payment}</span>
                </button>
              )}

              {(role === 'admin' || role === 'teacher') && (
                <button onClick={() => setActiveTab('admin')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === 'admin' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                  <Settings className="w-4 h-4" /> <span>{t.adminPanel}</span>
                </button>
              )}
            </nav>
          </div>

          <div className="space-y-4 pt-6 border-t border-slate-200 dark:border-slate-800 mt-auto">
            <button onClick={onOpenEduAI} className="w-full py-2.5 px-4 rounded-xl bg-gradient-to-r from-teal-500 to-indigo-600 text-white text-xs font-semibold flex items-center justify-center gap-2 shadow-lg hover:brightness-110 transition">
              <Sparkles className="w-4 h-4" />
              <span>{t.aiHelp}</span>
            </button>

            <div className="grid grid-cols-2 gap-2 text-xs">
              <button onClick={() => setDarkMode(!darkMode)} className="flex items-center justify-center gap-2 py-2 px-3 border border-slate-100 dark:border-slate-800 rounded-xl text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 transition">
                {darkMode ? <Sun className="w-3.5 h-3.5 text-amber-500" /> : <Moon className="w-3.5 h-3.5 text-indigo-400" />}
                <span>{darkMode ? 'Claro' : 'Escuro'}</span>
              </button>
              <select value={lang} onChange={(e) => setLang(e.target.value)} className="appearance-none flex items-center justify-center text-center py-2 px-3 border border-slate-100 dark:border-slate-800 rounded-xl text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 focus:outline-none">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
                <option value="es">🇪🇸 ES</option>
              </select>
            </div>

            <button onClick={onLogout} className="w-full flex items-center gap-3 px-4 py-2.5 text-xs font-medium text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-xl transition">
              <LogOut className="w-4 h-4" />
              <span>{t.logout}</span>
            </button>
          </div>
        </aside>
      );
    }

    // Main App
    function App() {
      // General States
      const [role, setRole] = useState(null);
      const [userEmail, setUserEmail] = useState('');
      const [activeTab, setActiveTab] = useState('classroom');
      const [isOffline, setIsOffline] = useState(false);
      const [lang, setLang] = useState('pt');
      const [darkMode, setDarkMode] = useState(true);

      // Data States
      const [students, setStudents] = useState([]);
      const [categories, setCategories] = useState([]);
      const [pointLogs, setPointLogs] = useState([]);
      const [messages, setMessages] = useState([]);
      const [calendarEvents, setCalendarEvents] = useState([]);
      const [payments, setPayments] = useState([]);
      const [webhooks, setWebhooks] = useState([]);
      const [webhookLogs, setWebhookLogs] = useState([]);
      const [auditLogs, setAuditLogs] = useState([]);

      // Classroom UI control
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [selectedStudentIds, setSelectedStudentIds] = useState([]);
      const [activeStudentForPoints, setActiveStudentForPoints] = useState(null);

      // Modal Triggers
      const [showAddStudentModal, setShowAddStudentModal] = useState(false);
      const [showAddEventModal, setShowAddEventModal] = useState(false);
      const [showAddCategoryModal, setShowAddCategoryModal] = useState(false);
      const [showPayModal, setShowPayModal] = useState(null);
      const [showWebhookConfigModal, setShowWebhookConfigModal] = useState(false);
      const [showEduAIChat, setShowEduAIChat] = useState(false);
      const [activeAIReportCard, setActiveAIReportCard] = useState(null);

      // Form inputs
      const [newStudentName, setNewStudentName] = useState('');
      const [newStudentParentName, setNewStudentParentName] = useState('');
      const [newStudentParentEmail, setNewStudentParentEmail] = useState('');
      const [newStudentAvatar, setNewStudentAvatar] = useState('👾');

      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventDate, setNewEventDate] = useState('');
      const [newEventCategory, setNewEventCategory] = useState('event');
      const [newEventDesc, setNewEventDesc] = useState('');

      const [newCategoryName, setNewCategoryName] = useState('');
      const [newCategoryType, setNewCategoryType] = useState('positive');
      const [newCategoryPoints, setNewCategoryPoints] = useState(1);

      const [cardName, setCardName] = useState('');
      const [cardNumber, setCardNumber] = useState('');
      const [cardExpiry, setCardExpiry] = useState('');
      const [cardCvc, setCardCvc] = useState('');

      // Webhooks configurator
      const [webhookName, setWebhookName] = useState('');
      const [webhookUrl, setWebhookUrl] = useState('');

      // AI Chatbot State
      const [aiPromptText, setAiPromptText] = useState('');
      const [aiLoading, setAiLoading] = useState(false);
      const [aiChatHistory, setAiChatHistory] = useState([
        { sender: 'ai', text: 'Olá! Sou o EduAI. Como posso te auxiliar com dicas pedagógicas, insights ou comunicação?', timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
      ]);
      const [generatingReportForId, setGeneratingReportForId] = useState(null);

      const t = translations[lang];

      // Theme toggle effect
      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      // Initialize Database (Dual Mode: Server with LocalStorage Fallback cache)
      useEffect(() => {
        const loadInitialData = async () => {
          try {
            const res = await fetch('/api/db-dump');
            if (res.ok) {
              const data = await res.json();
              hydrateState(data);
              localStorage.setItem('educlass_dojo_db', JSON.stringify(data));
              return;
            }
          } catch (e) {
            console.log("Servidor não localizado ou offline. Usando cache local.");
          }

          const cached = localStorage.getItem('educlass_dojo_db');
          if (cached) {
            hydrateState(JSON.parse(cached));
          } else {
            hydrateState(DEFAULT_DB);
            localStorage.setItem('educlass_dojo_db', JSON.stringify(DEFAULT_DB));
          }
        };

        loadInitialData();
      }, []);

      const hydrateState = (data) => {
        setStudents(data.students || []);
        setCategories(data.categories || []);
        setPointLogs(data.point_logs || []);
        setMessages(data.messages || []);
        setCalendarEvents(data.calendar || []);
        setPayments(data.payments || []);
        setWebhooks(data.webhooks || []);
        setWebhookLogs(data.webhook_trigger_logs || []);
        setAuditLogs(data.audit_logs || []);
      };

      // Auto-save State to LocalStorage on local mutations
      const saveStateToLocalStorage = (updated) => {
        const current = {
          students: updated.students || students,
          categories: updated.categories || categories,
          point_logs: updated.point_logs || pointLogs,
          messages: updated.messages || messages,
          calendar: updated.calendarEvents || calendarEvents,
          payments: updated.payments || payments,
          webhooks: updated.webhooks || webhooks,
          webhook_trigger_logs: updated.webhookLogs || webhookLogs,
          audit_logs: updated.auditLogs || auditLogs
        };
        localStorage.setItem('educlass_dojo_db', JSON.stringify(current));
      };

      // Unified action register with dynamic sync
      const registerAction = async (type, payload) => {
        // Optimistic UI updates
        applyActionLocally(type, payload);

        if (!isOffline) {
          try {
            let endpoint = '';
            if (type === 'points.add') endpoint = '/api/points';
            else if (type === 'points.batch') endpoint = '/api/points/batch';
            else if (type === 'messages.sent') endpoint = '/api/messages';
            else if (type === 'students.add') endpoint = '/api/students';

            if (endpoint) {
              await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
            }
          } catch (err) {
            console.log("Ação registrada localmente. Pendente de sincronização futura.");
          }
        }
      };

      const applyActionLocally = (type, payload) => {
        const timestamp = new Date().toISOString();
        const actionId = 'act_' + Math.random().toString(36).substr(2, 9);

        if (type === 'points.add') {
          const { studentId, categoryName, points, description, type: catType } = payload;
          setStudents(prev => {
            const updated = prev.map(s => s.id === studentId ? { ...s, points: s.points + points } : s);
            saveStateToLocalStorage({ students: updated });
            return updated;
          });
          setPointLogs(prev => {
            const newLog = { id: 'pl_' + actionId, studentId, categoryName, points, description, timestamp, type: catType };
            const updated = [newLog, ...prev];
            saveStateToLocalStorage({ point_logs: updated });
            return updated;
          });
          setAuditLogs(prev => {
            const student = students.find(s => s.id === studentId);
            const newAudit = { id: 'l_' + actionId, action: 'Atribuição de Pontos', user: 'Prof. Ricardo Silva', timestamp, details: `Atribuiu ${points} pontos para ${student?.name || ''} em '${categoryName}'` };
            const updated = [newAudit, ...prev];
            saveStateToLocalStorage({ auditLogs: updated });
            return updated;
          });
        }

        if (type === 'points.batch') {
          const { studentIds, categoryName, points, description, type: catType } = payload;
          setStudents(prev => {
            const updated = prev.map(s => studentIds.includes(s.id) ? { ...s, points: s.points + points } : s);
            saveStateToLocalStorage({ students: updated });
            return updated;
          });
          setPointLogs(prev => {
            const newLogs = studentIds.map(id => ({ id: 'pl_' + id + '_' + actionId, studentId: id, categoryName, points, description, timestamp, type: catType }));
            const updated = [...newLogs, ...prev];
            saveStateToLocalStorage({ point_logs: updated });
            return updated;
          });
          setAuditLogs(prev => {
            const newAudit = { id: 'l_' + actionId, action: 'Atribuição em Massa', user: 'Prof. Ricardo Silva', timestamp, details: `Atribuiu ${points} pontos para ${studentIds.length} alunos em '${categoryName}'` };
            const updated = [newAudit, ...prev];
            saveStateToLocalStorage({ auditLogs: updated });
            return updated;
          });
        }

        if (type === 'messages.sent') {
          setMessages(prev => {
            const newMsg = { id: 'm_' + actionId, senderId: payload.senderId, senderName: payload.senderName, receiverId: payload.receiverId, content: payload.content, timestamp };
            const updated = [...prev, newMsg];
            saveStateToLocalStorage({ messages: updated });
            return updated;
          });
        }

        if (type === 'students.add') {
          const newStudent = { id: 's_' + actionId, name: payload.name, avatar: payload.avatar, points: 0, parentEmail: payload.parentEmail, parentName: payload.parentName };
          setStudents(prev => {
            const updated = [...prev, newStudent];
            saveStateToLocalStorage({ students: updated });
            return updated;
          });
          setAuditLogs(prev => {
            const newAudit = { id: 'l_' + actionId, action: 'Adicionar Aluno', user: 'Prof. Ricardo Silva', timestamp, details: `Adicionou o aluno ${payload.name} no sistema.` };
            const updated = [newAudit, ...prev];
            saveStateToLocalStorage({ auditLogs: updated });
            return updated;
          });
        }
      };

      // Handlers
      const handleGivePoints = (cat) => {
        if (selectedStudentIds.length > 0) {
          registerAction('points.batch', {
            studentIds: selectedStudentIds,
            categoryName: cat.name,
            points: cat.points,
            description: "Pontuação coletiva",
            type: cat.type
          });
          setSelectedStudentIds([]);
        } else if (activeStudentForPoints) {
          registerAction('points.add', {
            studentId: activeStudentForPoints.id,
            categoryName: cat.name,
            points: cat.points,
            description: "Atitude observada em sala de aula.",
            type: cat.type
          });
        }
        setActiveStudentForPoints(null);
      };

      const handleAddStudentSubmit = (e) => {
        e.preventDefault();
        registerAction('students.add', {
          name: newStudentName,
          parentName: newStudentParentName || "Responsável",
          parentEmail: newStudentParentEmail || "responsavel@email.com",
          avatar: newStudentAvatar
        });
        setNewStudentName('');
        setNewStudentParentName('');
        setNewStudentParentEmail('');
        setShowAddStudentModal(false);
      };

      const handleAddEventSubmit = (e) => {
        e.preventDefault();
        const newEvent = {
          id: 'e_' + Math.random().toString(36).substr(2, 9),
          title: newEventTitle,
          date: newEventDate,
          category: newEventCategory,
          description: newEventDesc
        };
        const updated = [...calendarEvents, newEvent];
        setCalendarEvents(updated);
        saveStateToLocalStorage({ calendarEvents: updated });
        setNewEventTitle('');
        setNewEventDate('');
        setNewEventDesc('');
        setShowAddEventModal(false);
      };

      const handleAddCategorySubmit = (e) => {
        e.preventDefault();
        const newCat = {
          id: 'c_' + Math.random().toString(36).substr(2, 9),
          name: newCategoryName,
          type: newCategoryType,
          points: newCategoryPoints,
          icon: newCategoryType === 'positive' ? 'Award' : 'AlertTriangle'
        };
        const updated = [...categories, newCat];
        setCategories(updated);
        saveStateToLocalStorage({ categories: updated });
        setNewCategoryName('');
        setShowAddCategoryModal(false);
      };

      const handlePaymentSubmit = (e) => {
        e.preventDefault();
        const updated = payments.map(p => p.id === showPayModal.id ? { ...p, status: 'paid' } : p);
        setPayments(updated);
        saveStateToLocalStorage({ payments: updated });
        setShowPayModal(null);
        setCardName('');
        setCardNumber('');
        setCardExpiry('');
        setCardCvc('');
      };

      // AI Chat Ask Handler
      const handleAskEduAI = async (e) => {
        e.preventDefault();
        if (!aiPromptText.trim()) return;

        const userMsg = { sender: 'user', text: aiPromptText, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
        setAiChatHistory(prev => [...prev, userMsg]);
        setAiPromptText('');
        setAiLoading(true);

        try {
          const res = await fetch('/api/ai/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: aiPromptText })
          });
          if (res.ok) {
            const data = await res.json();
            setAiChatHistory(prev => [...prev, { sender: 'ai', text: data.text, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
            return;
          }
        } catch (err) {}

        // Local Smart Fallback
        setTimeout(() => {
          let response = "Interessante sua questão pedagógica. No Dojo Escolar, o reforço positivo é excelente para engajar os alunos. Estimular a participação ativa através do reconhecimento público ajuda na autoconfiança de forma integral.";
          const val = aiPromptText.toLowerCase();
          if (val.includes("tímido") || val.includes("timido")) {
            response = "Para apoiar um aluno tímido, evite chamadas públicas de surpresa. Use o Dojo para dar pontos por 'Participação Ativa' quando ele contribuir em duplas ou em formato privado. O feedback visual reforça que ele está seguro.";
          } else if (val.includes("conversando") || val.includes("conversa") || val.includes("bagunça")) {
            response = "Com conversas paralelas, procure criar um 'combinado de silêncio' coletivo e use a ferramenta de seleção em lote para pontuar todos que cumpriram o combinado. O reforço coletivo é mais empático.";
          } else if (val.includes("pais") || val.includes("responsáveis")) {
            response = "A melhor forma de contato com os pais é compartilhar as vitórias primeiro. No painel de mensagens, envie um relatório das atitudes positivas da semana, gerando um elo de confiança com a família.";
          }
          setAiChatHistory(prev => [...prev, { sender: 'ai', text: response, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
        }, 1000);
        setAiLoading(false);
      };

      // AI Weekly Report Card Handler
      const handleGenerateAIReport = async (student) => {
        setGeneratingReportForId(student.id);
        try {
          const res = await fetch('/api/ai/report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student })
          });
          if (res.ok) {
            const data = await res.json();
            setActiveAIReportCard({ student, reportText: data.text });
            return;
          }
        } catch(e) {}

        // Smart Local Draft Generator
        setTimeout(() => {
          let draft = `Prezado(a) responsável por ${student.name},\n\nGostaríamos de compartilhar um feedback semanal sobre o desenvolvimento dele(a) no Dojo.\n\n`;
          if (student.points >= 15) {
            draft += `Excelente evolução! O aluno alcançou ${student.points} pontos com grande destaque para a colaboração e a dedicação nas lições de casa. Tem sido um líder natural no grupo.\n\nParabéns! Mantemos o incentivo para que continue assim.`;
          } else if (student.points >= 5) {
            draft += `Belo progresso. O aluno acumula ${student.points} pontos, mantendo foco na maioria das dinâmicas. Ocasionalmente notamos distração em sala, mas nada que comprometa seu excelente potencial.\n\nSugerimos continuar o acompanhamento em casa.`;
          } else {
            draft += `Registramos algumas atitudes que requerem atenção conjunta, como conversas paralelas ou não entrega de tarefas, estando com ${student.points} pontos no momento.\n\nPropomos uma parceria próxima para reestabelecer o foco dele nas tarefas de sala de aula.`;
          }
          setActiveAIReportCard({ student, reportText: draft });
        }, 1000);
        setGeneratingReportForId(null);
      };

      // Filter Logic
      const filteredStudents = useMemo(() => {
        return students.filter(s => {
          const matchesSearch = s.name.toLowerCase().includes(searchQuery.toLowerCase());
          if (filterType === 'all') return matchesSearch;
          if (filterType === 'high') return matchesSearch && s.points >= 15;
          if (filterType === 'low') return matchesSearch && s.points < 10;
          return matchesSearch;
        });
      }, [students, searchQuery, filterType]);

      // PDF & Excel (CSV) Simulation Export
      const handleExportCSV = () => {
        const headers = "Nome,Pontos,Email do Responsável\n";
        const rows = students.map(s => `${s.name},${s.points},${s.parentEmail}`).join("\n");
        const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Dojo-Estudantes-${new Date().toISOString().split('T')[0]}.csv`);
        link.click();
      };

      if (!role) {
        return <LoginModal onLogin={(r, email) => { setRole(r); setUserEmail(email); if (r === 'student') setActiveTab('student_dashboard'); }} userEmail={userEmail} />;
      }

      return (
        <div className="flex flex-col lg:flex-row flex-1 w-full max-w-7xl mx-auto min-h-screen">
          <Sidebar
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            role={role}
            userEmail={userEmail}
            onLogout={() => { setRole(null); setSelectedStudentIds([]); }}
            isOffline={isOffline}
            setIsOffline={setIsOffline}
            lang={lang}
            setLang={setLang}
            darkMode={darkMode}
            setDarkMode={setDarkMode}
            t={t}
            onOpenEduAI={() => setShowEduAIChat(true)}
          />

          <main className="flex-1 flex flex-col p-6 lg:p-8 space-y-6 overflow-x-hidden">
            {/* Header / Top banner */}
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-4 border-b border-slate-200 dark:border-slate-800">
              <div>
                <span className="text-xs font-semibold text-[#c4a47c] tracking-wider uppercase font-mono">Dojo Dashboard</span>
                <h2 className="text-3xl font-serif font-light text-slate-800 dark:text-slate-100">Portal EduClass</h2>
              </div>
              <div className="flex gap-2 text-xs flex-wrap">
                {role === 'teacher' && (
                  <button onClick={() => setShowAddStudentModal(true)} className="px-4 py-2 bg-[#c4a47c] text-[#0a0a0b] font-bold rounded-xl transition hover:bg-[#b09069]">
                    + {t.addStudent}
                  </button>
                )}
                <button onClick={handleExportCSV} className="px-4 py-2 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-900 transition flex items-center gap-1.5">
                  <Download className="w-3.5 h-3.5" /> {t.exportExcel}
                </button>
              </div>
            </header>

            {/* Offline notification bar */}
            {isOffline && (
              <div className="p-4 bg-amber-500/10 border border-amber-500/20 rounded-2xl flex items-center gap-3 text-amber-600 dark:text-amber-400 text-xs animate-pulse">
                <WifiOff className="w-4 h-4 shrink-0" />
                <span>{t.offlineNotice}</span>
              </div>
            )}

            {/* STUDENT PORTAL TAB */}
            {activeTab === 'student_dashboard' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-r from-teal-500 to-indigo-600 rounded-3xl p-6 text-white relative overflow-hidden">
                  <h3 className="text-2xl font-serif">Meu Cinturão Dojo</h3>
                  <p className="text-sm opacity-80 mt-1">Davi Santos está atualmente com 15 pontos acumulados.</p>
                  <div className="mt-4 flex items-center gap-2">
                    <span className="px-3 py-1 bg-white/20 rounded-full text-xs font-bold">Cinturão Verde (Intermediário)</span>
                    <span className="text-xs opacity-70">Próxima meta: 25 pontos</span>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-white dark:bg-[#141416] border border-slate-200 dark:border-slate-900 rounded-3xl p-6">
                    <h4 className="font-serif text-lg text-[#c4a47c] mb-3">Minhas Medalhas</h4>
                    <div className="grid grid-cols-3 gap-3 text-center text-xs">
                      <div className="p-3 bg-slate-50 dark:bg-slate-800/40 rounded-2xl">
                        <span className="text-2xl block mb-1">🥇</span>
                        <strong className="block text-slate-700 dark:text-slate-300">Persistência</strong>
                      </div>
                      <div className="p-3 bg-slate-50 dark:bg-slate-800/40 rounded-2xl">
                        <span className="text-2xl block mb-1">🚀</span>
                        <strong className="block text-slate-700 dark:text-slate-300">Foco Total</strong>
                      </div>
                      <div className="p-3 bg-slate-50 dark:bg-slate-800/40 rounded-2xl">
                        <span className="text-2xl block mb-1">🤝</span>
                        <strong className="block text-slate-700 dark:text-slate-300">Cooperação</strong>
                      </div>
                    </div>
                  </div>

                  <div className="bg-white dark:bg-[#141416] border border-slate-200 dark:border-slate-900 rounded-3xl p-6 space-y-3">
                    <h4 className="font-serif text-lg text-[#c4a47c]">Atividades Recentes</h4>
                    <div className="space-y-2.5 text-xs max-h-48 overflow-y-auto">
                      {pointLogs.filter(log => log.studentId === 's4').map(log => (
                        <div key={log.id} className="p-3 bg-slate-50 dark:bg-[#1e1e21]/40 rounded-xl flex justify-between">
                          <div>
                            <strong>{log.categoryName}</strong>
                            <p className="text-slate-400 text-[10px]">{log.description}</p>
                          </div>
                          <span className={`font-mono font-bold ${log.points >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                            {log.points >= 0 ? `+${log.points}` : log.points}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* CLASSROOM TAB */}
            {activeTab === 'classroom' && (
              <div className="space-y-6">
                {/* Search & Filters */}
                <div className="flex flex-col md:flex-row gap-4 justify-between items-center bg-white dark:bg-[#141416] border border-slate-200 dark:border-slate-900 p-4 rounded-3xl">
                  <div className="relative w-full md:max-w-xs">
                    <Search className="absolute left-3 top-3 w-4 h-4 text-slate-400" />
                    <input
                      type="text"
                      placeholder={t.searchPlaceholder}
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-9 pr-4 py-2 text-xs bg-slate-50 dark:bg-[#1e1e21] border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-200 focus:outline-none"
                    />
                  </div>
                  <div className="flex gap-2 w-full md:w-auto shrink-0 justify-end overflow-x-auto text-xs">
                    <button onClick={() => setFilterType('all')} className={`px-3 py-1.5 rounded-xl transition ${filterType === 'all' ? 'bg-[#c4a47c] text-[#0a0a0b]' : 'border border-slate-200 dark:border-slate-800'}`}>Todos</button>
                    <button onClick={() => setFilterType('high')} className={`px-3 py-1.5 rounded-xl transition ${filterType === 'high' ? 'bg-emerald-600 text-white' : 'border border-slate-200 dark:border-slate-800'}`}>Cinturão de Ouro</button>
                    <button onClick={() => setFilterType('low')} className={`px-3 py-1.5 rounded-xl transition ${filterType === 'low' ? 'bg-rose-600 text-white' : 'border border-slate-200 dark:border-slate-800'}`}>Apoio Pedagógico</button>
                  </div>
                </div>

                {/* Batch selection panel */}
                {selectedStudentIds.length > 0 && (
                  <div className="p-4 bg-[#c4a47c]/10 border border-[#c4a47c]/20 rounded-2xl flex justify-between items-center text-xs animate-fade-in">
                    <span><strong>{selectedStudentIds.length}</strong> alunos selecionados para pontuação coletiva</span>
                    <div className="flex gap-2">
                      <button onClick={() => setActiveStudentForPoints({ id: 'batch', name: 'Lançamento Coletivo', avatar: '👥' })} className="px-3 py-1.5 bg-[#c4a47c] text-[#0a0a0b] font-bold rounded-lg hover:bg-[#b09069] transition">Atribuir Pontos</button>
                      <button onClick={() => setSelectedStudentIds([])} className="text-slate-400 hover:text-white">Cancelar</button>
                    </div>
                  </div>

                <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-800 flex justify-between items-center text-xs">
                  <span className="text-slate-400">Valor total:</span>
                  <strong className="text-xl text-white font-mono">R$ {showPayModal.amount.toFixed(2)}</strong>
                </div>

                <form onSubmit={handlePaymentSubmit} className="space-y-4 text-xs">
                  <div>
                    <label className="block text-slate-400 mb-1">Titular do Cartão</label>
                    <input type="text" required value={cardName} onChange={(e) => setCardName(e.target.value)} className="w-full bg-[#1e1e21] border border-slate-800 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none" />
                  </div>
                  <div>
                    <label className="block text-slate-400 mb-1">Número do Cartão de Crédito</label>
                    <input type="text" required maxLength={19} placeholder="4000 1234 5678 9010" value={cardNumber} onChange={(e) => setCardNumber(e.target.value)} className="w-full bg-[#1e1e21] border border-slate-800 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-slate-400 mb-1">Validade (MM/AA)</label>
                      <input type="text" required maxLength={5} placeholder="08/29" value={cardExpiry} onChange={(e) => setCardExpiry(e.target.value)} className="w-full bg-[#1e1e21] border border-slate-800 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none" />
                    </div>
                    <div>
                      <label className="block text-slate-400 mb-1">CVC</label>
                      <input type="password" required maxLength={4} placeholder="***" value={cardCvc} onChange={(e) => setCardCvc(e.target.value)} className="w-full bg-[#1e1e21] border border-slate-800 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none" />
                    </div>
                  </div>
                  <button type="submit" className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg transition">Confirmar Pagamento</button>
                </form>
              </div>
            </div>
          )}

          {/* POPUP PANEL: PEDAGOGICAL AI CHAT ASSISTANT (GEMINI) */}
          {showEduAIChat && (
            <div className="fixed bottom-6 right-6 w-96 bg-[#141416] border border-slate-800 rounded-3xl shadow-2xl z-40 overflow-hidden flex flex-col h-[480px] animate-fade-in">
              <div className="bg-gradient-to-r from-teal-600 to-indigo-700 p-4 flex justify-between items-center text-white">
                <div className="flex items-center gap-2">
                  <Sparkles className="w-5 h-5" />
                  <div>
                    <h4 className="text-xs font-bold uppercase tracking-wider">EduAI Advisor</h4>
                    <span className="text-[9px] opacity-75">Orientador Comportamental</span>
                  </div>
                </div>
                <button onClick={() => setShowEduAIChat(false)} className="text-white hover:text-slate-200 font-bold text-xs">✕</button>
              </div>

              <div className="flex-1 p-4 overflow-y-auto space-y-3 bg-[#0a0a0b]/40 text-xs">
                {aiChatHistory.map((item, index) => (
                  <div key={index} className={`p-3 rounded-2xl ${item.sender === 'user' ? 'bg-[#c4a47c] text-[#0a0a0b] font-semibold ml-auto max-w-[85%]' : 'bg-[#1e1e21] text-slate-300 mr-auto max-w-[85%] border border-slate-900 whitespace-pre-wrap'}`}>
                    <p className="leading-relaxed">{item.text}</p>
                    <span className="text-[8px] opacity-50 block mt-1 text-right">{item.timestamp}</span>
                  </div>
                ))}

                {aiLoading && (
                  <div className="p-3 bg-[#1e1e21] mr-auto rounded-2xl flex items-center gap-2 text-slate-500 max-w-[85%] border border-slate-900">
                    <RefreshCw className="w-4.5 h-4.5 animate-spin text-[#c4a47c]" />
                    <span>EduAI formulando parecer...</span>
                  </div>
                )}
              </div>

              <form onSubmit={handleAskEduAI} className="p-2 border-t border-slate-900 flex gap-2 bg-[#141416]">
                <input
                  type="text"
                  placeholder="Dúvida sobre timidez, conversa..."
                  value={aiPromptText}
                  onChange={(e) => setAiPromptText(e.target.value)}
                  className="flex-1 bg-[#1e1e21] border border-slate-800 rounded-xl px-3 py-1.5 text-xs text-slate-100 placeholder-slate-500 focus:outline-none"
                />
                <button type="submit" className="bg-[#c4a47c] hover:bg-[#b09069] text-[#0a0a0b] p-2 rounded-xl transition shrink-0">
                  <Send className="w-3.5 h-3.5" />
                </button>
              </form>
            </div>
          )}

          {/* POPUP PANEL: DETAILED WEEKLY AI BEHAVIORAL REPORT */}
          {activeAIReportCard && (
            <div className="fixed inset-0 bg-[#0a0a0b]/80 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
              <div className="bg-[#141416] border border-[#c4a47c]/30 rounded-3xl p-8 max-w-2xl w-full space-y-6 shadow-2xl relative">
                <div className="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-indigo-500 via-[#c4a47c] to-indigo-600"></div>
                <div className="flex justify-between items-start">
                  <div className="flex items-center gap-3">
                    <span className="text-4xl">{activeAIReportCard.student.avatar}</span>
                    <div>
                      <h3 className="font-serif text-2xl text-[#c4a47c]">Parecer Comportamental</h3>
                      <p className="text-xs text-slate-400">Sugestão de mensagem para os responsáveis de {activeAIReportCard.student.name}</p>
                    </div>
                  </div>
                  <button onClick={() => setActiveAIReportCard(null)} className="text-slate-400 hover:text-white border border-slate-800 rounded-lg px-2 py-1 text-xs">Fechar</button>
                </div>

                <div className="bg-slate-900/60 p-6 rounded-2xl border border-slate-800 max-h-[300px] overflow-y-auto text-xs text-slate-300 leading-relaxed whitespace-pre-wrap">
                  {activeAIReportCard.reportText}
                </div>

                <div className="pt-4 border-t border-slate-900 flex justify-between items-center gap-4 text-xs">
                  <span className="text-slate-500">Copie o texto para enviar no chat ou via e-mail corporativo.</span>
                  <div className="flex gap-2">
                    <button
                      onClick={() => {
                        navigator.clipboard.writeText(activeAIReportCard.reportText);
                        alert("Texto copiado para a área de transferência!");
                      }}
                      className="px-4 py-2 border border-slate-800 text-slate-300 hover:text-white hover:bg-slate-900 rounded-xl transition"
                    >
                      Copiar Texto
                    </button>
                    <button
                      onClick={() => {
                        registerAction('messages.sent', {
                          senderId: 'teacher_1',
                          senderName: 'Prof. Ricardo Silva',
                          receiverId: activeAIReportCard.student.parentEmail,
                          content: activeAIReportCard.reportText
                        });
                        setActiveTab('messages');
                        setActiveAIReportCard(null);
                      }}
                      className="px-4 py-2 bg-[#c4a47c] text-[#0a0a0b] font-bold rounded-xl transition"
                    >
                      Enviar no Chat Privado
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
